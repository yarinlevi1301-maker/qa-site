<!DOCTYPE html>
<html>

<head>

<title>שאלה</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<div class="logo">Q&A</div>

<div class="backButton" onclick="goBack()">⬅ חזור לבית</div>
<a class="navLink" href="all.html">כל השאלות</a>

</header>

<div class="container">

<h2 id="questionText"></h2>
<div id="questionActions" style="margin-bottom:10px; display:none;">
  <button onclick="editQuestion()">✏️ ערוך</button>
  <button onclick="deleteQuestion()">🗑️ מחק</button>
</div>
<button onclick="goToAnswer()" class="writeAnswerBtn">
<span class="writeAnswerIcon">💬</span>
כתוב תשובה
</button>


<h3 id="answersTitle">תשובות</h3>

<div id="answers"></div>

<div id="answerBox" style="margin-top:25px">

<input id="answerInput" placeholder="כתוב תשובה..." onkeypress="handleEnter(event)">
<button onclick="sendAnswer()">שלח</button>

</div>

</div>

<script>

function timeAgo(time){

let seconds = Math.floor((Date.now() - time) / 1000)

let minutes = Math.floor(seconds / 60)
let hours = Math.floor(seconds / 3600)
let days = Math.floor(seconds / 86400)

if(seconds < 60) return "עכשיו"
if(minutes < 60) return "לפני " + minutes + " דקות"
if(hours < 24) return "לפני " + hours + " שעות"
return "לפני " + days + " ימים"

}

let params = new URLSearchParams(location.search)
let id = params.get("id")

async function loadQuestion(){

let data = JSON.parse(localStorage.getItem("questions") || "[]");

let q = data[id]

let count = q.answers.length

let title = document.getElementById("answersTitle")

if(count === 0){
title.innerText = "אין תשובות עדיין"
}
else if(count === 1){
title.innerText = "תשובה אחת"
}
else{
title.innerText = count + " תשובות"
}

document.getElementById("questionText").innerText = q.text

let answersDiv = document.getElementById("answers")
answersDiv.innerHTML=""

q.answers
.map((a,i)=>({a,i}))
.sort((x,y)=>{

if(q.best === x.i) return -1
if(q.best === y.i) return 1
return 0

})
.forEach(({a,i})=>{

let div=document.createElement("div")

div.className = q.best === i ? "answerCard bestAnswer" : "answerCard"

div.innerHTML=`

<div class="answerHeader">

<div class="answerAvatar">

${a.avatar
? `<img class="avatarImg" src="${a.avatar}">`
: `<div class="avatarLetter">${a.user ? a.user.charAt(0).toUpperCase() : "A"}</div>`
}

</div>

<div class="answerUser">
${a.user ? a.user : "אנונימי"} • ${timeAgo(a.time)}
</div>

</div>

<div class="answerText">

${q.best === i ? "<div class='bestLabel'>⭐ BEST ANSWER</div>" : ""}

${a.text}

<div class="vote-box">

  <button class="vote-btn like" onclick="vote(${i},'like')">
    <i class="like-icon"></i>
    <span>${a.likes}</span>
  </button>

  <button class="vote-btn dislike" onclick="vote(${i},'dislike')">
    <i class="dislike-icon"></i>
    <span>${a.dislikes}</span>
  </button>

  <button class="vote-btn best" onclick="bestAnswer(${i})">
    <i class="star-icon"></i>
  </button>

</div>

`

answersDiv.appendChild(div)

})

}

async function sendAnswer(){

let input=document.getElementById("answerInput")
let answer=input.value

if(!answer) return

await fetch("/answer",{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

id:id,
answer:answer

})

})

input.value=""

loadQuestion()

}

function vote(i, type){

let data = JSON.parse(localStorage.getItem("questions") || "[]");

let q = data[id];

if(!q || !q.answers[i]) return;

/* אם אין לייקים עדיין */
q.answers[i].likes = q.answers[i].likes || 0;
q.answers[i].dislikes = q.answers[i].dislikes || 0;

if(type === "like"){
  q.answers[i].likes++;
}else{
  q.answers[i].dislikes++;
}

/* שמירה */
localStorage.setItem("questions", JSON.stringify(data));

/* רענון */
loadQuestion();
}

async function bestAnswer(i){

await fetch("/bestAnswer",{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

questionId:id,
answerId:i

})

})

loadQuestion()

}

/* הפונקציה החדשה לכפתור */

function goToAnswer(){

document.getElementById("answerBox").scrollIntoView({
behavior:"smooth"
})

document.getElementById("answerInput").focus()

}

function handleEnter(e){

if(e.key==="Enter"){

sendAnswer()

}

}

loadQuestion()

</script>
<script>
function goBack() {
    window.location.href = "/"; // מחזיר לדף הבית
}
</script>
</body>

</html>
